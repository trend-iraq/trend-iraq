<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ترند العراق">
<meta name="theme-color" content="#D4AF37">
<title>ترند العراق</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4AF37;--gold2:#F5C842;
  --dark:#070710;--d2:#0F0F1E;--d3:#171728;--d4:#1F1F35;
  --text:#F0F0FF;--muted:#7070A0;--red:#FF4C6A;--green:#00D4A0;
  --border:rgba(212,175,55,0.15);
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);}
.topbar{background:var(--d2);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:calc(12px + var(--st));display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10;}
.logo-wrap{flex:1;display:flex;align-items:center;gap:8px;}
.logo-name{font-size:18px;font-weight:900;color:var(--gold);}
.logo-sub{font-size:10px;color:var(--muted);}
.cart-btn{position:relative;width:44px;height:44px;border-radius:12px;background:var(--d3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;}
.cart-btn:active{transform:scale(0.9);}
.cbadge{position:absolute;top:-6px;left:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:9px;padding:0 3px;display:none;align-items:center;justify-content:center;}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.bnav{background:var(--d2);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--sb);}
.ntab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;color:var(--muted);font-size:10px;gap:3px;position:relative;transition:color 0.2s;}
.ntab .ni{font-size:24px;line-height:1;}
.ntab.on{color:var(--gold);}
.ntab.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:3px;background:var(--gold);border-radius:0 0 4px 4px;}
.page{display:none;padding:14px;}
.page.on{display:block;}
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{width:100%;padding:13px 14px 13px 40px;background:var(--d3);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
.cats-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.cats-row::-webkit-scrollbar{display:none;}
.cpill{flex-shrink:0;padding:8px 16px;border-radius:20px;background:var(--d3);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;}
.cpill:active{transform:scale(0.95);}
.cpill.on{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border-color:var(--gold);}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pcard{background:var(--d3);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.pcard:active{transform:scale(0.97);}
/* PRODUCT SLIDER */
.pcard-slider{position:relative;aspect-ratio:1;background:var(--d4);overflow:hidden;}
.pcard-slider img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0;}
.pcard-slider img.on{display:block;}
.pcard-nav{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 4px;pointer-events:none;}
.pcnb{width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:14px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;}
.pcnb:active{transform:scale(0.85);}
.pcard-dots{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);display:flex;gap:3px;}
.pcdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.4);}
.pcdot.on{background:#fff;width:10px;border-radius:3px;}
.disc-badge{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:10px;}
.pbody{padding:10px;}
.pcat{font-size:10px;color:var(--gold);font-weight:600;margin-bottom:3px;}
.pname{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.pprice{font-size:14px;font-weight:900;color:var(--gold);}
.pprice-old{font-size:10px;color:var(--muted);text-decoration:line-through;}
.atc-btn{width:100%;margin-top:8px;padding:9px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.atc-btn:active{transform:scale(0.95);}
.atc-btn.added{background:var(--green);}
.emp{text-align:center;padding:50px 20px;color:var(--muted);}
.ei{font-size:48px;opacity:0.3;margin-bottom:12px;}
/* DETAIL SHEET */
.sov{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(5px);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.sov.on{opacity:1;pointer-events:all;}
.sh{position:fixed;bottom:0;left:0;right:0;background:var(--d2);border-radius:22px 22px 0 0;border-top:1px solid var(--border);z-index:101;transform:translateY(100%);transition:transform 0.35s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;padding-bottom:calc(20px + var(--sb));}
.sh.on{transform:translateY(0);}
.sh-handle{width:38px;height:4px;background:var(--d4);border-radius:2px;margin:12px auto 0;}
.sh-body{padding:16px 20px;}
/* DETAIL SLIDER */
.detail-slider{position:relative;width:100%;aspect-ratio:4/3;background:var(--d4);border-radius:14px;overflow:hidden;margin-bottom:14px;}
.detail-slider img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0;}
.detail-slider img.on{display:block;}
.det-nav{position:absolute;top:50%;transform:translateY(-50%);width:100%;display:flex;justify-content:space-between;padding:0 8px;pointer-events:none;}
.detnb{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.65);border:none;color:#fff;font-size:18px;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;}
.det-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.ddot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);}
.ddot.on{background:#fff;width:14px;border-radius:3px;}
.det-count{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.65);color:#fff;font-size:11px;padding:3px 8px;border-radius:10px;}
.det-thumbs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;}
.det-thumbs::-webkit-scrollbar{display:none;}
.det-thumb{width:50px;height:50px;border-radius:10px;border:2px solid var(--border);overflow:hidden;flex-shrink:0;cursor:pointer;}
.det-thumb.on{border-color:var(--gold);}
.det-thumb img{width:100%;height:100%;object-fit:cover;}
/* CART */
.cart-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.ci-img{width:60px;height:60px;border-radius:12px;background:var(--d4);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;overflow:hidden;}
.ci-img img{width:60px;height:60px;object-fit:cover;border-radius:12px;}
.ci-info{flex:1;min-width:0;}
.ci-name{font-size:13px;font-weight:700;margin-bottom:4px;}
.ci-price{font-size:13px;font-weight:700;color:var(--gold);}
.ci-qty{display:flex;align-items:center;gap:10px;margin-top:8px;}
.qbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--d4);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.qbtn:active{transform:scale(0.85);}
.ci-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;margin-right:auto;}
.of-card{background:var(--d3);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;}
.of-title{font-size:14px;font-weight:700;margin-bottom:12px;}
.fg{margin-bottom:12px;}
.fl{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px;display:block;}
.fi{width:100%;padding:12px 14px;background:var(--d4);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;}
.fi:focus{border-color:var(--gold);}
.fi::placeholder{color:var(--muted);}
textarea.fi{resize:none;height:80px;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid var(--border);}
.total-val{font-size:20px;font-weight:900;color:var(--gold);}
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.btn:active{transform:scale(0.97);}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--text);}
.success-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.success-overlay.on{display:flex;}
.success-box{background:var(--d2);border:1px solid var(--green);border-radius:24px;padding:40px 24px;text-align:center;width:100%;max-width:340px;}
.loading{position:fixed;inset:0;background:rgba(7,7,16,0.85);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body style="display:flex;flex-direction:column;height:100%;">

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted);">جاري التحميل...</div>
</div>

<div class="topbar">
  <div class="logo-wrap">
    <span style="font-size:24px;">👑</span>
    <div><div class="logo-name">ترند العراق</div><div class="logo-sub">أفضل المنتجات</div></div>
  </div>
  <div class="cart-btn" onclick="goTab(2)">🛒<span class="cbadge" id="cbadge">0</span></div>
</div>

<div class="scroll" id="scr">
  <!-- SHOP -->
  <div class="page on" id="pg-shop">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input placeholder="ابحث عن منتج..." oninput="handleSearch(this.value)" id="sinput">
    </div>
    <div class="cats-row" id="cats-row"><div class="cpill on" onclick="filterCat('',this)">🛍️ الكل</div></div>
    <div class="pgrid" id="pgrid"><div class="emp" style="grid-column:1/-1"><div class="ei">🛍️</div><p>جاري تحميل المنتجات...</p></div></div>
  </div>

  <!-- CART -->
  <div class="page" id="pg-cart">
    <div id="cart-content"><div class="emp"><div class="ei">🛒</div><p>السلة فارغة</p></div></div>
  </div>

  <!-- ABOUT -->
  <div class="page" id="pg-about">
    <div style="text-align:center;padding:30px 0 20px;">
      <div style="font-size:56px;margin-bottom:12px;">👑</div>
      <div style="font-size:22px;font-weight:900;color:var(--gold);">ترند العراق</div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px;">أفضل متجر إلكتروني في العراق</div>
    </div>
    <div style="background:var(--d3);border:1px solid var(--border);border-radius:16px;padding:16px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;">تواصل معنا</div>
      <div style="display:flex;flex-direction:column;gap:10px;font-size:13px;">
        <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:20px;">📍</span><span id="ab-addr" style="color:var(--muted);">بغداد، العراق</span></div>
        <div style="display:flex;align-items:center;gap:10px;"><span style="font-size:20px;">📱</span><span id="ab-wa" style="color:var(--muted);">—</span></div>
        <div style="display:flex;align-items:start;gap:10px;"><span style="font-size:20px;">ℹ️</span><span id="ab-desc" style="color:var(--muted);line-height:1.7;"></span></div>
      </div>
    </div>
  </div>
</div>

<nav class="bnav">
  <div class="ntab on" id="t0" onclick="goTab(0)"><span class="ni">🏠</span>الرئيسية</div>
  <div class="ntab" id="t1" onclick="goTab(1)"><span class="ni">🔍</span>البحث</div>
  <div class="ntab" id="t2" onclick="goTab(2)"><span class="ni">🛒</span>السلة</div>
  <div class="ntab" id="t3" onclick="goTab(3)"><span class="ni">ℹ️</span>عنا</div>
</nav>

<!-- PRODUCT DETAIL SHEET -->
<div class="sov" id="pdS-ov" onclick="closeDetail()"></div>
<div class="sh" id="pdS">
  <div class="sh-handle"></div>
  <div class="sh-body" id="pd-body"></div>
</div>

<!-- SUCCESS -->
<div class="success-overlay" id="success">
  <div class="success-box">
    <div style="font-size:60px;margin-bottom:14px;">🎉</div>
    <div style="font-size:22px;font-weight:900;color:var(--green);margin-bottom:8px;">تم استلام طلبك!</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7;">شكراً لثقتك بترند العراق<br>سيتواصل معك فريقنا قريباً</div>
    <button class="btn btn-g" onclick="closeSuccess()">متابعة التسوق</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, addDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCy3R9IKu99vNtWtIu5WkfENlJk8HuEs-Y",
  authDomain: "trend-iraq-6b8bb.firebaseapp.com",
  projectId: "trend-iraq-6b8bb",
  storageBucket: "trend-iraq-6b8bb.firebasestorage.app",
  messagingSenderId: "241354225868",
  appId: "1:241354225868:web:fc87c54164928323fd6a69",
  measurementId: "G-Y7Q3BTE0F2"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products=[], cats=[], cart=JSON.parse(sessionStorage.getItem('tiq_cart')||'[]');
let activeCat='', searchQ='';
let detailImgIdx=0, currentDetailImgs=[];

function hideLoading(){ document.getElementById('loading').style.display='none'; }
function saveCart(){ sessionStorage.setItem('tiq_cart',JSON.stringify(cart)); }

// TABS
const pgs=['shop','cart','cart','about'];
window.goTab=function(i){
  ['pg-shop','pg-cart','pg-about'].forEach(p=>document.getElementById(p).classList.remove('on'));
  document.querySelectorAll('.ntab').forEach((t,j)=>t.classList.toggle('on',j===i));
  const pg=i===2?'pg-cart':i===3?'pg-about':'pg-shop';
  document.getElementById(pg).classList.add('on');
  document.getElementById('scr').scrollTop=0;
  if(i===2) renderCart();
}

// DETAIL
window.openDetail=function(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const imgs=p.images&&p.images.length?p.images:(p.img?[p.img]:[]);
  currentDetailImgs=imgs; detailImgIdx=0;
  const inCart=cart.some(c=>c.id===id);
  const fp=p.discount?Math.round(p.price*(1-p.discount/100)):p.price;
  document.getElementById('pd-body').innerHTML=`
    ${imgs.length?`
    <div class="detail-slider" id="det-slider">
      ${imgs.map((src,i)=>`<img src="${src}" class="${i===0?'on':''}">`).join('')}
      ${imgs.length>1?`<div class="det-nav"><button class="detnb" onclick="detPrev()">‹</button><button class="detnb" onclick="detNext()">›</button></div>`:'' }
      ${imgs.length>1?`<div class="det-count" id="det-count">1/${imgs.length}</div>`:'' }
      ${imgs.length>1?`<div class="det-dots">${imgs.map((_,i)=>`<div class="ddot ${i===0?'on':''}" id="ddot-${i}"></div>`).join('')}</div>`:'' }
    </div>
    ${imgs.length>1?`<div class="det-thumbs">${imgs.map((src,i)=>`<div class="det-thumb ${i===0?'on':''}" id="dthumb-${i}" onclick="setDetImg(${i})"><img src="${src}"></div>`).join('')}</div>`:'' }
    `:''}
    ${p.cat?`<div style="font-size:11px;color:var(--gold);font-weight:600;margin-bottom:6px;">${p.cat}</div>`:''}
    <div style="font-size:20px;font-weight:900;margin-bottom:8px;">${p.name}</div>
    ${p.desc?`<div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:14px;">${p.desc}</div>`:''}
    <div style="font-size:24px;font-weight:900;color:var(--gold);margin-bottom:${p.discount?'4':'14'}px;">${fp.toLocaleString()} IQD</div>
    ${p.discount?`<div style="font-size:12px;color:var(--muted);text-decoration:line-through;margin-bottom:14px;">${p.price.toLocaleString()} IQD</div>`:''}
    <button class="btn btn-g" id="pd-atc" onclick="addCart('${p.id}');this.textContent='✓ تمت الإضافة';this.style.background='var(--green)'">${inCart?'✓ موجود في السلة':'🛒 أضف إلى السلة'}</button>
  `;
  document.getElementById('pdS-ov').classList.add('on');
  document.getElementById('pdS').classList.add('on');
}
window.closeDetail=function(){
  document.getElementById('pdS-ov').classList.remove('on');
  document.getElementById('pdS').classList.remove('on');
}
window.detNext=function(){
  detailImgIdx=(detailImgIdx+1)%currentDetailImgs.length;
  updateDetSlider();
}
window.detPrev=function(){
  detailImgIdx=(detailImgIdx-1+currentDetailImgs.length)%currentDetailImgs.length;
  updateDetSlider();
}
window.setDetImg=function(i){ detailImgIdx=i; updateDetSlider(); }
function updateDetSlider(){
  const sl=document.getElementById('det-slider');if(!sl)return;
  sl.querySelectorAll('img').forEach((img,i)=>img.classList.toggle('on',i===detailImgIdx));
  const dc=document.getElementById('det-count');if(dc)dc.textContent=`${detailImgIdx+1}/${currentDetailImgs.length}`;
  currentDetailImgs.forEach((_,i)=>{
    const d=document.getElementById('ddot-'+i);if(d)d.classList.toggle('on',i===detailImgIdx);
    const t=document.getElementById('dthumb-'+i);if(t)t.classList.toggle('on',i===detailImgIdx);
  });
}

// CATS
function renderCats(){
  const row=document.getElementById('cats-row');
  row.innerHTML=`<div class="cpill on" onclick="filterCat('',this)">🛍️ الكل</div>`+
    cats.map(c=>`<div class="cpill" onclick="filterCat('${c.name}',this)">${c.icon}${c.name}</div>`).join('');
}
window.filterCat=function(cat,el){
  activeCat=cat;
  document.querySelectorAll('.cpill').forEach(p=>p.classList.remove('on'));
  if(el)el.classList.add('on');
  renderGrid();
}
window.handleSearch=function(v){ searchQ=v; renderGrid(); }

// GRID with per-card sliders
let cardSliderIdx={};
function renderGrid(){
  let list=products.filter(p=>p.status==='active');
  if(activeCat)list=list.filter(p=>p.cat===activeCat);
  if(searchQ)list=list.filter(p=>p.name.includes(searchQ)||(p.desc||'').includes(searchQ));
  const g=document.getElementById('pgrid');
  if(!list.length){g.innerHTML='<div class="emp" style="grid-column:1/-1"><div class="ei">🔍</div><p>لا توجد منتجات</p></div>';return;}
  g.innerHTML=list.map(p=>{
    const imgs=p.images&&p.images.length?p.images:(p.img?[p.img]:[]);
    const fp=p.discount?Math.round(p.price*(1-p.discount/100)):p.price;
    const inC=cart.some(c=>c.id===p.id);
    cardSliderIdx[p.id]=cardSliderIdx[p.id]||0;
    return `
      <div class="pcard" onclick="openDetail('${p.id}')">
        <div class="pcard-slider">
          ${imgs.length?imgs.map((src,i)=>`<img src="${src}" class="${i===0?'on':''}" id="ci-${p.id}-${i}">`).join(''):`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;opacity:0.3;">📦</div>`}
          ${imgs.length>1?`<div class="pcard-nav"><button class="pcnb" onclick="event.stopPropagation();cardPrev('${p.id}',${imgs.length})">‹</button><button class="pcnb" onclick="event.stopPropagation();cardNext('${p.id}',${imgs.length})">›</button></div>`:''}
          ${imgs.length>1?`<div class="pcard-dots">${imgs.map((_,i)=>`<div class="pcdot ${i===0?'on':''}" id="cd-${p.id}-${i}"></div>`).join('')}</div>`:''}
          ${p.discount?`<span class="disc-badge">-${p.discount}%</span>`:''}
        </div>
        <div class="pbody">
          ${p.cat?`<div class="pcat">${p.cat}</div>`:''}
          <div class="pname">${p.name}</div>
          <div class="pprice">${fp.toLocaleString()} IQD</div>
          ${p.discount?`<div class="pprice-old">${p.price.toLocaleString()} IQD</div>`:''}
          <button class="atc-btn ${inC?'added':''}" id="atc-${p.id}" onclick="event.stopPropagation();addCart('${p.id}')">${inC?'✓ مضاف':'+ السلة'}</button>
        </div>
      </div>`;
  }).join('');
}
window.cardNext=function(id,len){
  cardSliderIdx[id]=((cardSliderIdx[id]||0)+1)%len;
  updateCardSlider(id,len);
}
window.cardPrev=function(id,len){
  cardSliderIdx[id]=((cardSliderIdx[id]||0)-1+len)%len;
  updateCardSlider(id,len);
}
function updateCardSlider(id,len){
  const idx=cardSliderIdx[id]||0;
  for(let i=0;i<len;i++){
    const img=document.getElementById(`ci-${id}-${i}`);
    const dot=document.getElementById(`cd-${id}-${i}`);
    if(img)img.classList.toggle('on',i===idx);
    if(dot)dot.classList.toggle('on',i===idx);
  }
}

// CART
window.addCart=function(id){
  const p=products.find(x=>x.id===id);if(!p)return;
  const fp=p.discount?Math.round(p.price*(1-p.discount/100)):p.price;
  const imgs=p.images&&p.images.length?p.images:(p.img?[p.img]:[]);
  const ex=cart.find(c=>c.id===id);
  if(ex)ex.qty++;
  else cart.push({id:p.id,name:p.name,price:fp,img:imgs[0]||'',qty:1});
  saveCart(); updateCartBadge();
  const btn=document.getElementById('atc-'+id);
  if(btn){btn.textContent='✓ مضاف';btn.classList.add('added');}
}
window.changeQty=function(id,d){
  const item=cart.find(c=>c.id===id);if(!item)return;
  item.qty+=d;
  if(item.qty<=0)cart=cart.filter(c=>c.id!==id);
  saveCart();updateCartBadge();renderCart();renderGrid();
}
window.removeCart=function(id){cart=cart.filter(c=>c.id!==id);saveCart();updateCartBadge();renderCart();renderGrid();}
function updateCartBadge(){
  const n=cart.reduce((s,c)=>s+c.qty,0);
  const b=document.getElementById('cbadge');
  b.textContent=n;b.style.display=n?'flex':'none';
}
function renderCart(){
  const total=cart.reduce((s,c)=>s+(c.price*c.qty),0);
  const el=document.getElementById('cart-content');
  if(!cart.length){el.innerHTML='<div class="emp"><div class="ei">🛒</div><p>السلة فارغة</p></div>';return;}
  el.innerHTML=`
    <div style="margin-bottom:14px;">
      ${cart.map(item=>`
        <div class="cart-item">
          <div class="ci-img">${item.img?`<img src="${item.img}" onerror="this.outerHTML='📦'">` :'📦'}</div>
          <div class="ci-info">
            <div class="ci-name">${item.name}</div>
            <div class="ci-price">${item.price.toLocaleString()} IQD</div>
            <div class="ci-qty">
              <div class="qbtn" onclick="changeQty('${item.id}',-1)">−</div>
              <span style="font-size:14px;font-weight:700;">${item.qty}</span>
              <div class="qbtn" onclick="changeQty('${item.id}',1)">+</div>
              <button class="ci-del" onclick="removeCart('${item.id}')">🗑️</button>
            </div>
          </div>
        </div>`).join('')}
    </div>
    <div class="of-card">
      <div class="of-title">📋 بيانات الطلب</div>
      <div class="fg"><label class="fl">الاسم الكامل *</label><input class="fi" id="o-n" placeholder="محمد أحمد..."></div>
      <div class="fg"><label class="fl">رقم الهاتف *</label><input class="fi" id="o-p" placeholder="07xxxxxxxxx" type="tel"></div>
      <div class="fg"><label class="fl">العنوان *</label><input class="fi" id="o-a" placeholder="بغداد - الكرادة..."></div>
      <div class="fg"><label class="fl">ملاحظات</label><textarea class="fi" id="o-no" placeholder="أي ملاحظات..."></textarea></div>
    </div>
    <div class="of-card">
      <div class="total-row"><div style="font-size:16px;font-weight:700;">الإجمالي</div><div class="total-val">${total.toLocaleString()} IQD</div></div>
      <button class="btn btn-g" onclick="submitOrder()">🚀 تأكيد الطلب</button>
    </div>`;
}
window.submitOrder=async function(){
  const n=document.getElementById('o-n')?.value.trim();
  const p=document.getElementById('o-p')?.value.trim();
  const a=document.getElementById('o-a')?.value.trim();
  const no=document.getElementById('o-no')?.value.trim();
  if(!n||!p||!a){alert('من فضلك أكمل البيانات المطلوبة');return;}
  const total=cart.reduce((s,c)=>s+(c.price*c.qty),0);
  await addDoc(collection(db,'orders'),{
    customer:n,phone:p,address:a,notes:no||'',
    items:cart.map(c=>({...c})),total,status:'new',
    date:new Date().toLocaleDateString('ar-IQ'),
    createdAt:Date.now(),
  });
  cart=[];saveCart();updateCartBadge();
  document.getElementById('success').classList.add('on');
}
window.closeSuccess=function(){
  document.getElementById('success').classList.remove('on');
  renderGrid();goTab(0);
}

// REALTIME
onSnapshot(collection(db,'products'),snap=>{
  products=snap.docs.map(d=>({id:d.id,...d.data()}));
  products.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
  renderGrid();
  hideLoading();
});
onSnapshot(collection(db,'categories'),snap=>{
  cats=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderCats();
});
onSnapshot(doc(db,'settings','main'),snap=>{
  if(snap.exists()){
    const s=snap.data();
    document.getElementById('ab-addr').textContent=s.address||'بغداد، العراق';
    document.getElementById('ab-wa').textContent=s.whatsapp||'—';
    document.getElementById('ab-desc').textContent=s.desc||'';
  }
});

updateCartBadge();
</script>
</body>
</html>
